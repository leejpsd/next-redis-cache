name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      REDIS_URL: redis://127.0.0.1:6379
      REVALIDATION_SECRET: ci-revalidation-secret
      WEBHOOK_SIGNING_SECRET: ci-webhook-signing-secret
      APP_BASE_URL: http://localhost:3000
      DISABLE_REDIS_CACHE_HANDLER: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
