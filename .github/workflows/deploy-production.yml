name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "ECR image tag to deploy"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      ECS_CLUSTER_NAME: ${{ secrets.PROD_ECS_CLUSTER_NAME }}
      ECS_SERVICE_NAME: ${{ secrets.PROD_ECS_SERVICE_NAME }}
      ECS_TASK_FAMILY: ${{ secrets.PROD_ECS_TASK_FAMILY }}
      CONTAINER_NAME: next-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Fetch current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "$ECS_TASK_FAMILY" \
            --query taskDefinition \
            > task-definition.json

      - name: Render next task definition
        run: |
          IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${{ github.event.inputs.image_tag }}
          jq \
            --arg IMAGE_URI "$IMAGE_URI" \
            --arg CONTAINER_NAME "$CONTAINER_NAME" \
            '
              del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
              | .containerDefinitions =
                (.containerDefinitions | map(
                  if .name == $CONTAINER_NAME
                  then .image = $IMAGE_URI
                  else .
                  end
                ))
            ' task-definition.json > task-definition.rendered.json

      - name: Register task definition
        id: taskdef
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://task-definition.rendered.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_definition_arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER_NAME" \
            --service "$ECS_SERVICE_NAME" \
            --task-definition "${{ steps.taskdef.outputs.task_definition_arn }}"

      - name: Wait for deployment stability
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER_NAME" \
            --services "$ECS_SERVICE_NAME"
