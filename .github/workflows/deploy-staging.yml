name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      ECS_CLUSTER_NAME: ${{ secrets.ECS_CLUSTER_NAME }}
      ECS_SERVICE_NAME: ${{ secrets.ECS_SERVICE_NAME }}
      ECS_TASK_FAMILY: ${{ secrets.ECS_TASK_FAMILY }}
      CONTAINER_NAME: next-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: image
        run: |
          IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${GITHUB_SHA}
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Fetch current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "$ECS_TASK_FAMILY" \
            --query taskDefinition \
            > task-definition.json

      - name: Render next task definition
        run: |
          jq \
            --arg IMAGE_URI "${{ steps.image.outputs.image_uri }}" \
            --arg CONTAINER_NAME "$CONTAINER_NAME" \
            '
              del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
              | .containerDefinitions =
                (.containerDefinitions | map(
                  if .name == $CONTAINER_NAME
                  then .image = $IMAGE_URI
                  else .
                  end
                ))
            ' task-definition.json > task-definition.rendered.json

      - name: Register task definition
        id: taskdef
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://task-definition.rendered.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_definition_arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER_NAME" \
            --service "$ECS_SERVICE_NAME" \
            --task-definition "${{ steps.taskdef.outputs.task_definition_arn }}"

      - name: Wait for deployment stability
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER_NAME" \
            --services "$ECS_SERVICE_NAME"

      - name: Load staging verification inputs
        run: |
          APP_BASE_URL=$(jq -r \
            --arg CONTAINER_NAME "$CONTAINER_NAME" \
            '.containerDefinitions[]
            | select(.name == $CONTAINER_NAME)
            | .environment[]
            | select(.name == "APP_BASE_URL")
            | .value' task-definition.rendered.json)

          REVALIDATION_SECRET=$(jq -r \
            --arg CONTAINER_NAME "$CONTAINER_NAME" \
            '.containerDefinitions[]
            | select(.name == $CONTAINER_NAME)
            | .environment[]
            | select(.name == "REVALIDATION_SECRET")
            | .value' task-definition.rendered.json)

          WEBHOOK_SIGNING_SECRET=$(jq -r \
            --arg CONTAINER_NAME "$CONTAINER_NAME" \
            '.containerDefinitions[]
            | select(.name == $CONTAINER_NAME)
            | .environment[]
            | select(.name == "WEBHOOK_SIGNING_SECRET")
            | .value' task-definition.rendered.json)

          echo "APP_BASE_URL=$APP_BASE_URL" >> "$GITHUB_ENV"
          echo "REVALIDATION_SECRET=$REVALIDATION_SECRET" >> "$GITHUB_ENV"
          echo "WEBHOOK_SIGNING_SECRET=$WEBHOOK_SIGNING_SECRET" >> "$GITHUB_ENV"

      - name: Verify shared cache on staging
        run: node scripts/verify-staging-shared-cache.mjs
